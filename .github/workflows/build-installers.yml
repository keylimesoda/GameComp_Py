name: Build LoreKeeper Installers

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: LoreKeeper-Windows
            pyinstaller_args: --name LoreKeeper --onefile --windowed --icon=NONE
          - os: macos-latest
            artifact_name: LoreKeeper-macOS
            pyinstaller_args: --name LoreKeeper --onefile --windowed --icon=NONE

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} lorekeeper_launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/LoreKeeper*

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LoreKeeper*
